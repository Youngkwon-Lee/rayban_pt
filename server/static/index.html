<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rayban Local Bridge</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2318221d'/%3E%3Ctext x='32' y='40' text-anchor='middle' font-family='Arial' font-size='22' font-weight='700' fill='white'%3ERB%3C/text%3E%3C/svg%3E" />
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f4;
      --surface: #ffffff;
      --surface-soft: #f1f5f2;
      --line: #d9ded8;
      --text: #17201b;
      --muted: #68736d;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --green: #0f766e;
      --amber: #b45309;
      --red: #b91c1c;
      --shadow: 0 14px 36px rgba(23, 32, 27, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    button, input, textarea {
      font: inherit;
    }

    button {
      min-height: 40px;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 9px 14px;
      background: #18221d;
      color: #fff;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { cursor: not-allowed; opacity: 0.55; transform: none; }

    input[type="text"], input[type="password"], textarea, input[type="file"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 10px 12px;
    }

    textarea {
      min-height: 124px;
      resize: vertical;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    pre {
      margin: 0;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      line-height: 1.55;
    }

    .app-shell {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 18px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 18px;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 8px;
      background: #18221d;
      color: #fff;
      font-weight: 800;
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      font-size: 21px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 8px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      padding: 7px 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--amber);
    }

    .status-pill.ok .status-dot { background: var(--green); }
    .status-pill.error .status-dot { background: var(--red); }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border-color: var(--line);
    }

    .btn-primary {
      background: var(--primary);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text);
      border-color: var(--line);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(360px, 0.75fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding: 16px;
    }

    .panel-title {
      margin: 0;
      font-size: 16px;
      letter-spacing: 0;
    }

    .panel-body {
      padding: 16px;
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .grid.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .toolbar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .tabs {
      display: flex;
      gap: 6px;
      border-bottom: 1px solid var(--line);
      padding: 10px 10px 0;
      background: var(--surface-soft);
      border-radius: 8px 8px 0 0;
    }

    .tab {
      border-color: transparent;
      border-radius: 8px 8px 0 0;
      background: transparent;
      color: var(--muted);
      font-weight: 800;
    }

    .tab.is-active {
      background: var(--surface);
      color: var(--text);
      border-color: var(--line);
      border-bottom-color: var(--surface);
      transform: none;
    }

    .tab-panel {
      display: none;
      padding: 16px;
    }

    .tab-panel.is-active {
      display: block;
    }

    .ops-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      padding: 13px;
    }

    .metric-value {
      display: block;
      margin-top: 4px;
      color: var(--text);
      font-size: 18px;
      font-weight: 800;
    }

    .switch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-soft);
      padding: 12px;
    }

    .switch-row label {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
      font-size: 14px;
      font-weight: 750;
    }

    .switch-row input {
      width: 18px;
      height: 18px;
      accent-color: var(--green);
    }

    .notice {
      border-left: 4px solid var(--amber);
      border-radius: 8px;
      background: #fff7ed;
      color: #7c2d12;
      padding: 10px 12px;
      font-size: 13px;
    }

    .result-panel {
      position: sticky;
      top: 18px;
    }

    .result-meta {
      color: var(--muted);
      font-size: 12px;
    }

    .result-box {
      min-height: 420px;
      max-height: 640px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #101815;
      color: #eef7f0;
      padding: 14px;
    }

    .chart-box {
      display: none;
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfdfb;
      color: var(--text);
      padding: 14px;
    }

    .chart-box.is-visible {
      display: block;
    }

    .events-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .events-table th,
    .events-table td {
      border-bottom: 1px solid var(--line);
      padding: 10px 8px;
      text-align: left;
      vertical-align: middle;
    }

    .events-table th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .events-table button {
      min-height: 32px;
      padding: 6px 9px;
      font-size: 12px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: #e8f4ef;
      color: #0f5f59;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 800;
    }

    .tag.warn {
      background: #fff1df;
      color: #8a4a05;
    }

    .section-gap {
      margin-top: 18px;
    }

    details {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-soft);
      padding: 10px 12px;
    }

    summary {
      cursor: pointer;
      color: var(--text);
      font-weight: 750;
    }

    .visually-small {
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .result-panel {
        position: static;
      }

      .ops-grid,
      .grid.two,
      .grid.three {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .app-shell {
        padding: 12px;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .top-actions {
        justify-content: flex-start;
      }

      .tabs {
        overflow-x: auto;
      }

      .tab {
        white-space: nowrap;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">RB</div>
        <div>
          <h1>Rayban Local Bridge</h1>
          <div class="subtitle">캡처 입력, 이벤트 조회, 라벨링을 한 화면에서 처리합니다.</div>
        </div>
      </div>
      <div class="top-actions">
        <span id="healthBadge" class="status-pill"><span class="status-dot"></span><span>확인 중</span></span>
        <button class="btn-secondary" type="button" onclick="refreshHealth()">상태 새로고침</button>
        <button class="btn-ghost" type="button" onclick="window.location.href='/docs'">API 문서</button>
      </div>
    </header>

    <section class="layout">
      <div class="grid">
        <section class="panel">
          <div class="panel-header">
            <h2 class="panel-title">운영 상태</h2>
            <button class="btn-secondary" type="button" onclick="listRecent()">최근 이벤트</button>
          </div>
          <div class="panel-body grid">
            <div class="ops-grid">
              <div class="metric">
                <label>DB</label>
                <span id="metricDb" class="metric-value">-</span>
              </div>
              <div class="metric">
                <label>캐시</label>
                <span id="metricCache" class="metric-value">-</span>
              </div>
              <div class="metric">
                <label>타임아웃</label>
                <span id="metricTimeout" class="metric-value">-</span>
              </div>
              <div class="metric">
                <label>최근 오류</label>
                <span id="metricErrors" class="metric-value">-</span>
              </div>
            </div>

            <div class="grid two">
              <label>
                API Key
                <input id="apiKey" type="password" placeholder="BRIDGE_API_KEY" autocomplete="off" />
              </label>
              <div class="switch-row">
                <label>
                  <input id="pairingReady" type="checkbox" />
                  Ray-Ban 촬영 준비 완료
                </label>
                <span id="pairingStatus" class="tag warn">미확인</span>
              </div>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="tabs" role="tablist" aria-label="작업 선택">
            <button id="tabText" class="tab is-active" type="button" onclick="switchPanel('textPanel')">텍스트</button>
            <button id="tabAudio" class="tab" type="button" onclick="switchPanel('audioPanel')">오디오</button>
            <button id="tabLookup" class="tab" type="button" onclick="switchPanel('lookupPanel')">조회</button>
            <button id="tabLabel" class="tab" type="button" onclick="switchPanel('labelPanel')">라벨</button>
          </div>

          <section id="textPanel" class="tab-panel is-active">
            <div class="grid">
              <div class="grid two">
                <label>
                  Source
                  <input id="source" type="text" value="iphone" />
                </label>
                <label>
                  Patient
                  <input id="patientName" type="text" placeholder="환자명" />
                </label>
              </div>
              <label>
                기록 내용
                <textarea id="text">환아 김민수 MRN:12345678 보행 불안정, 통증 6점</textarea>
              </label>
              <div class="toolbar">
                <button class="btn-primary" type="button" onclick="sendText()">기록 전송</button>
                <button class="btn-secondary" type="button" onclick="useSampleText()">샘플 입력</button>
              </div>
            </div>
          </section>

          <section id="audioPanel" class="tab-panel">
            <div class="grid">
              <div class="grid two">
                <label>
                  Source
                  <input id="audioSource" type="text" value="iphone" />
                </label>
                <label>
                  Patient
                  <input id="audioPatientName" type="text" placeholder="환자명" />
                </label>
              </div>
              <label>
                오디오 파일
                <input id="audioFile" type="file" accept="audio/*,.m4a,.mp3,.wav,.aac,.ogg,.flac,.webm" />
              </label>
              <div class="toolbar">
                <button class="btn-primary" type="button" onclick="uploadAudio()">업로드 및 분석</button>
              </div>
              <details>
                <summary>폼 업로드</summary>
                <form class="grid section-gap" action="/ingest-upload" method="post" enctype="multipart/form-data" target="_blank">
                  <input type="hidden" name="event_type" value="audio" />
                  <label>Source<input type="text" name="source" value="iphone" /></label>
                  <label>오디오 파일<input type="file" name="audio" /></label>
                  <button type="submit">폼으로 업로드</button>
                </form>
              </details>
            </div>
          </section>

          <section id="lookupPanel" class="tab-panel">
            <div class="grid">
              <label>
                Event ID
                <input id="eventId" type="text" placeholder="event_id" />
              </label>
              <div class="toolbar">
                <button class="btn-primary" type="button" onclick="checkEvent()">이벤트 조회</button>
                <button class="btn-secondary" type="button" onclick="getChart()">차트 보기</button>
                <button class="btn-secondary" type="button" onclick="listRecent()">최근 이벤트</button>
              </div>
              <div id="recentEventsWrap" class="section-gap"></div>
            </div>
          </section>

          <section id="labelPanel" class="tab-panel">
            <div class="grid">
              <label>
                Event ID
                <input id="labelEventId" type="text" placeholder="라벨링할 event_id" />
              </label>
              <div class="grid three">
                <label>Session<input id="sessionType" type="text" value="기립훈련" /></label>
                <label>Assist<input id="assistLevel" type="text" value="mod" /></label>
                <label>Performance<input id="performance" type="text" value="보통" /></label>
              </div>
              <label>
                Core task
                <input id="coreTask" type="text" value="경부 회전+중립 유지" />
              </label>
              <label>
                Flags
                <input id="flags" type="text" value="피로,자세흔들림" />
              </label>
              <label>
                Notes
                <textarea id="labelNotes" rows="3">후반부 집중도 저하</textarea>
              </label>
              <div class="toolbar">
                <button class="btn-primary" type="button" onclick="saveLabel()">라벨 저장</button>
                <button class="btn-secondary" type="button" onclick="getLabel()">라벨 조회</button>
              </div>
            </div>
          </section>
        </section>
      </div>

      <aside class="panel result-panel">
        <div class="panel-header">
          <div>
            <h2 id="outputTitle" class="panel-title">응답</h2>
            <div id="outputMeta" class="result-meta">아직 실행된 작업이 없습니다.</div>
          </div>
          <button class="btn-secondary" type="button" onclick="copyEventId()">Event ID 복사</button>
        </div>
        <div class="panel-body">
          <pre id="out" class="result-box">작업 결과가 여기에 표시됩니다.</pre>
          <pre id="chartOut" class="chart-box"></pre>
        </div>
      </aside>
    </section>
  </main>

  <script>
    const panelToTab = {
      textPanel: "tabText",
      audioPanel: "tabAudio",
      lookupPanel: "tabLookup",
      labelPanel: "tabLabel"
    };

    const apiKeyEl = document.getElementById("apiKey");
    const pairingReadyEl = document.getElementById("pairingReady");
    const pairingStatusEl = document.getElementById("pairingStatus");
    const outEl = document.getElementById("out");
    const chartOutEl = document.getElementById("chartOut");
    const outputTitleEl = document.getElementById("outputTitle");
    const outputMetaEl = document.getElementById("outputMeta");

    apiKeyEl.value = localStorage.getItem("bridge_api_key") || "";
    apiKeyEl.addEventListener("input", () => {
      localStorage.setItem("bridge_api_key", apiKeyEl.value || "");
    });

    pairingReadyEl.checked = (localStorage.getItem("rayban_pairing_ready") || "") === "1";
    pairingReadyEl.addEventListener("change", () => {
      localStorage.setItem("rayban_pairing_ready", pairingReadyEl.checked ? "1" : "0");
      updatePairing();
    });

    function switchPanel(panelId) {
      document.querySelectorAll(".tab-panel").forEach(panel => {
        panel.classList.toggle("is-active", panel.id === panelId);
      });
      Object.entries(panelToTab).forEach(([targetPanel, tabId]) => {
        document.getElementById(tabId).classList.toggle("is-active", targetPanel === panelId);
      });
    }

    function updatePairing() {
      pairingStatusEl.textContent = pairingReadyEl.checked ? "준비됨" : "미확인";
      pairingStatusEl.className = pairingReadyEl.checked ? "tag" : "tag warn";
    }

    function authHeaders(isJson = false) {
      const headers = {};
      const key = (apiKeyEl.value || "").trim();
      if (isJson) headers["Content-Type"] = "application/json";
      if (key) headers["x-api-key"] = key;
      return headers;
    }

    function setBusy(title, message) {
      outputTitleEl.textContent = title;
      outputMetaEl.textContent = message;
      outEl.textContent = message;
      chartOutEl.classList.remove("is-visible");
      chartOutEl.textContent = "";
    }

    function renderOutput(title, data) {
      outputTitleEl.textContent = title;
      outputMetaEl.textContent = new Date().toLocaleString();
      outEl.textContent = typeof data === "string" ? data : JSON.stringify(data, null, 2);
      captureEventId(data);
    }

    function captureEventId(data) {
      const eventId =
        data?.event_id ||
        data?.data?.event_id ||
        data?.result?.event?.id ||
        data?.data?.result?.event?.id ||
        data?.label?.event_id ||
        data?.data?.label?.event_id;

      if (!eventId) return;
      document.getElementById("eventId").value = eventId;
      document.getElementById("labelEventId").value = eventId;
    }

    function useSampleText() {
      document.getElementById("text").value = "환아 김민수 MRN:12345678 보행 안정, 통증 2점, ROM 90도";
    }

    async function refreshHealth() {
      const badge = document.getElementById("healthBadge");
      try {
        const res = await fetch("/health", { headers: authHeaders(false) });
        const data = await res.json();
        badge.className = data.ok ? "status-pill ok" : "status-pill error";
        badge.lastElementChild.textContent = data.ok ? "서버 정상" : "확인 필요";
        document.getElementById("metricDb").textContent = data.db?.ok ? "정상" : "오류";
        document.getElementById("metricCache").textContent = String(data.async_cache?.items ?? "-");
        document.getElementById("metricTimeout").textContent = `${data.processing?.timeout_seconds ?? "-"}s`;
        document.getElementById("metricErrors").textContent = String(data.recent_error_logs_60m ?? 0);
      } catch (e) {
        badge.className = "status-pill error";
        badge.lastElementChild.textContent = "오프라인";
        renderOutput("상태 오류", String(e));
      }
    }

    async function sendText() {
      setBusy("텍스트 전송", "전송 중...");
      try {
        const payload = {
          source: document.getElementById("source").value || "iphone",
          event_type: "text",
          text: document.getElementById("text").value || "",
          patient_name: document.getElementById("patientName").value || ""
        };
        const res = await fetch("/ingest", {
          method: "POST",
          headers: authHeaders(true),
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        renderOutput("텍스트 전송", { status: res.status, data });
        await listRecent(false, false);
      } catch (e) {
        renderOutput("텍스트 전송 오류", String(e));
      }
    }

    async function uploadAudio() {
      const file = document.getElementById("audioFile").files[0];
      if (!file) {
        renderOutput("오디오 업로드", "오디오 파일을 선택하세요.");
        return;
      }

      setBusy("오디오 업로드", "업로드 중...");
      try {
        const fd = new FormData();
        fd.append("source", document.getElementById("audioSource").value || "iphone");
        fd.append("event_type", "audio");
        fd.append("patient_name", document.getElementById("audioPatientName").value || "");
        fd.append("audio", file);

        const res = await fetch("/ingest-upload", {
          method: "POST",
          headers: authHeaders(false),
          body: fd
        });
        const data = await res.json();
        renderOutput("오디오 업로드", { status: res.status, data, poll: "processing" });

        if (!data.event_id) return;
        for (let i = 0; i < 20; i += 1) {
          await new Promise(resolve => setTimeout(resolve, 1000));
          const eventRes = await fetch(`/events/${data.event_id}`, { headers: authHeaders(false) });
          const eventData = await eventRes.json();
          renderOutput("오디오 분석", { upload: data, event: eventData });
          if (eventData.status === "done" || eventData.status === "error") {
            await listRecent(false, false);
            return;
          }
        }
      } catch (e) {
        renderOutput("오디오 업로드 오류", String(e));
      }
    }

    async function checkEvent(id) {
      const eventId = (id || document.getElementById("eventId").value || "").trim();
      if (!eventId) {
        renderOutput("이벤트 조회", "event_id를 입력하세요.");
        return;
      }

      setBusy("이벤트 조회", "조회 중...");
      try {
        const res = await fetch(`/events/${eventId}`, { headers: authHeaders(false) });
        const data = await res.json();
        renderOutput("이벤트 조회", { status: res.status, data });
      } catch (e) {
        renderOutput("이벤트 조회 오류", String(e));
      }
    }

    async function getChart(id) {
      const eventId = (id || document.getElementById("eventId").value || "").trim();
      if (!eventId) {
        renderOutput("차트 조회", "event_id를 입력하세요.");
        return;
      }

      try {
        const res = await fetch(`/charts/${eventId}`, { headers: authHeaders(false) });
        const data = await res.json();
        renderOutput("차트 조회", { status: res.status, event_id: eventId });
        chartOutEl.textContent = data.chart || JSON.stringify(data, null, 2);
        chartOutEl.classList.add("is-visible");
      } catch (e) {
        renderOutput("차트 조회 오류", String(e));
      }
    }

    async function listRecent(focusPanel = true, updateOutput = true) {
      try {
        const res = await fetch("/recent-events", { headers: authHeaders(false) });
        const data = await res.json();
        if (updateOutput) {
          renderOutput("최근 이벤트", { status: res.status, data });
        }
        renderRecentEvents(data.items || []);
        if (focusPanel) switchPanel("lookupPanel");
      } catch (e) {
        renderOutput("최근 이벤트 오류", String(e));
      }
    }

    function renderRecentEvents(items) {
      const wrap = document.getElementById("recentEventsWrap");
      if (!items.length) {
        wrap.innerHTML = '<div class="notice">최근 이벤트가 없습니다.</div>';
        return;
      }

      const rows = items.map(item => `
        <tr>
          <td><span class="tag">${escapeHtml(item.event_type || "-")}</span></td>
          <td>${escapeHtml(item.patient_name || "-")}</td>
          <td>${escapeHtml(item.created_at || "-")}</td>
          <td>${item.has_label ? "있음" : "없음"}</td>
          <td>
            <button class="btn-secondary" type="button" onclick="checkEvent('${item.id}')">조회</button>
            <button class="btn-secondary" type="button" onclick="getChart('${item.id}')">차트</button>
          </td>
        </tr>
      `).join("");

      wrap.innerHTML = `
        <table class="events-table">
          <thead>
            <tr>
              <th>유형</th>
              <th>환자</th>
              <th>생성</th>
              <th>라벨</th>
              <th>동작</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    async function saveLabel() {
      const eventId = (document.getElementById("labelEventId").value || document.getElementById("eventId").value || "").trim();
      if (!eventId) {
        renderOutput("라벨 저장", "event_id를 입력하세요.");
        return;
      }

      const flagsRaw = (document.getElementById("flags").value || "").trim();
      const payload = {
        session_type: document.getElementById("sessionType").value || "",
        core_task: document.getElementById("coreTask").value || "",
        assist_level: document.getElementById("assistLevel").value || "",
        performance: document.getElementById("performance").value || "",
        flags: flagsRaw ? flagsRaw.split(",").map(value => value.trim()).filter(Boolean) : [],
        notes: document.getElementById("labelNotes").value || ""
      };

      setBusy("라벨 저장", "저장 중...");
      try {
        const res = await fetch(`/labels/${eventId}`, {
          method: "POST",
          headers: authHeaders(true),
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        renderOutput("라벨 저장", { status: res.status, data });
        await listRecent(false, false);
      } catch (e) {
        renderOutput("라벨 저장 오류", String(e));
      }
    }

    async function getLabel() {
      const eventId = (document.getElementById("labelEventId").value || document.getElementById("eventId").value || "").trim();
      if (!eventId) {
        renderOutput("라벨 조회", "event_id를 입력하세요.");
        return;
      }

      try {
        const res = await fetch(`/labels/${eventId}`, { headers: authHeaders(false) });
        const data = await res.json();
        renderOutput("라벨 조회", { status: res.status, data });
      } catch (e) {
        renderOutput("라벨 조회 오류", String(e));
      }
    }

    async function copyEventId() {
      const eventId = (document.getElementById("eventId").value || "").trim();
      if (!eventId) {
        renderOutput("Event ID 복사", "복사할 event_id가 없습니다.");
        return;
      }
      await navigator.clipboard.writeText(eventId);
      outputMetaEl.textContent = "event_id를 클립보드에 복사했습니다.";
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    updatePairing();
    refreshHealth();
    listRecent(false, false);
  </script>
</body>
</html>
